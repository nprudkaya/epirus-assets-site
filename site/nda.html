<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confidentiality Agreement — Epirus Assets</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ────────────────────────────────────────── */
    :root {
      --parchment:   #F4EFE6;
      --white:       #FFFFFF;
      --night:       #1C1C1A;
      --gold:        #B8924A;
      --gold-ring:   rgba(184, 146, 74, 0.12);
      --stone:       #7A6A5A;
      --pale-stone:  #E2DDD6;
      --serif:       'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      --sans:        'DM Sans', system-ui, -apple-system, sans-serif;
    }

    /* ── Reset ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--sans);
      background: var(--parchment);
      color: var(--night);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    a { color: inherit; text-decoration: none; }
    img, svg { display: block; }
    button { cursor: pointer; font-family: inherit; background: none; border: none; }

    /* Visually hidden but accessible */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ── Page layout ──────────────────────────────────────────── */
    .page-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 64px;
      padding-bottom: 80px;
    }
    @media (max-width: 740px) {
      .page-wrap { padding: 0 20px 80px; }
    }

    /* ── Header ───────────────────────────────────────────────── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 40px 0 56px;
    }
    .logo-link { display: flex; align-items: center; }
    .logo-img  { max-height: 56px; width: auto; }

    /* ── Language switcher ────────────────────────────────────── */
    .lang-switcher {
      display: flex;
      align-items: center;
    }
    .lang-btn {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: var(--stone);
      padding: 4px 0;
      transition: color 0.15s;
    }
    .lang-btn:hover { color: var(--night); }
    .lang-btn.active {
      color: var(--gold);
      font-weight: 500;
    }
    .lang-sep {
      font-size: 11px;
      color: var(--pale-stone);
      padding: 0 6px;
      user-select: none;
    }

    /* ── Invalid ref state ────────────────────────────────────── */
    .invalid-state {
      display: none;
      padding: 64px 0 32px;
      text-align: center;
    }
    .invalid-msg {
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.7;
      color: var(--stone);
      margin-bottom: 16px;
    }
    .invalid-contact {
      font-family: var(--sans);
      font-size: 14px;
      color: var(--stone);
    }
    .invalid-contact a {
      color: var(--gold);
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .invalid-contact a:hover { border-color: var(--gold); }

    /* ── NDA section ──────────────────────────────────────────── */
    .nda-section { display: none; }

    .kicker {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .nda-heading {
      font-family: var(--serif);
      font-size: clamp(30px, 5vw, 44px);
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: -0.01em;
      color: var(--night);
      margin-bottom: 28px;
    }

    /* Scrollable NDA text box */
    .nda-text-box {
      background: var(--white);
      border: 0.5px solid var(--pale-stone);
      border-radius: 4px;
      padding: 24px;
      height: 220px;
      overflow-y: auto;
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.75;
      color: var(--stone);
      margin-bottom: 32px;
      scroll-behavior: smooth;
    }
    .nda-text-box p + p { margin-top: 1em; }

    /* ── Form ─────────────────────────────────────────────────── */
    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 6px;
    }

    .form-input {
      display: block;
      width: 100%;
      background: var(--white);
      border: 0.5px solid var(--pale-stone);
      border-radius: 4px;
      padding: 11px 14px;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--night);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    .form-input::placeholder { color: var(--stone); }
    .form-input:focus {
      border: 1px solid var(--gold);
      box-shadow: 0 0 0 3px var(--gold-ring);
    }

    /* ── Custom checkbox ──────────────────────────────────────── */
    .checkbox-wrap {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
    }

    /* Hide native checkbox but keep it in tab order */
    .checkbox-wrap input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 16px;
      height: 16px;
    }

    .checkbox-box {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      border: 1px solid var(--pale-stone);
      border-radius: 3px;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      transition: background 0.15s, border-color 0.15s;
      pointer-events: none;
    }
    .checkbox-box svg { display: none; }

    .checkbox-wrap input[type="checkbox"]:checked + .checkbox-box {
      background: var(--gold);
      border-color: var(--gold);
    }
    .checkbox-wrap input[type="checkbox"]:checked + .checkbox-box svg {
      display: block;
    }
    /* Focus ring on the visual checkbox */
    .checkbox-wrap input[type="checkbox"]:focus-visible + .checkbox-box {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    .checkbox-text {
      font-family: var(--sans);
      font-size: 14px;
      color: var(--night);
      line-height: 1.5;
      user-select: none;
    }

    /* ── Section separator ────────────────────────────────────── */
    .section-sep {
      border: none;
      border-top: 1px solid var(--pale-stone);
      margin: 24px 0;
    }

    /* ── GDPR body text ───────────────────────────────────────── */
    .gdpr-body {
      font-family: var(--sans);
      font-size: 12px;
      color: var(--stone);
      line-height: 1.6;
      margin-top: 10px;
      padding-left: 28px;
    }

    /* ── Submit button ────────────────────────────────────────── */
    .btn-submit {
      display: block;
      width: 100%;
      padding: 14px 20px;
      background: transparent;
      border: 1px solid var(--gold);
      border-radius: 4px;
      color: var(--gold);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      margin-top: 32px;
      text-align: center;
    }
    .btn-submit:not(:disabled):hover {
      background: var(--gold);
      color: var(--parchment);
    }
    .btn-submit:disabled {
      opacity: 0.35;
      pointer-events: none;
      cursor: not-allowed;
    }

    /* ── Success section ──────────────────────────────────────── */
    .success-section {
      display: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .success-section.visible { display: block; }
    .success-section.faded-in { opacity: 1; }

    .success-greeting {
      font-family: var(--serif);
      font-size: clamp(30px, 5vw, 48px);
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: -0.01em;
      color: var(--night);
      margin-bottom: 10px;
    }
    .success-title-line {
      font-family: var(--sans);
      font-size: 15px;
      color: var(--stone);
      line-height: 1.6;
      margin-bottom: 4px;
    }
    .success-subtitle {
      font-family: var(--sans);
      font-size: 13px;
      color: var(--stone);
      margin-bottom: 40px;
    }

    /* ── Property cards ───────────────────────────────────────── */
    .property-cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .property-card {
      background: var(--white);
      border: 0.5px solid var(--pale-stone);
      border-radius: 6px;
      padding: 20px 24px;
      transition: border-color 0.15s;
    }
    .property-card:hover { border-color: var(--gold); }
    .property-card-name {
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 500;
      color: var(--night);
      margin-bottom: 6px;
    }
    .property-card-desc {
      font-family: var(--sans);
      font-size: 12px;
      color: var(--stone);
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .property-card-link {
      display: inline-block;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      color: var(--gold);
      border-bottom: 1px solid var(--gold);
      padding-bottom: 1px;
      transition: opacity 0.15s;
    }
    .property-card-link:hover { opacity: 0.75; }
  </style>
</head>

// ── State ────────────────────────────────────────────────────────────
let currentLang = "en";
let currentRef  = null;

// ── Language ─────────────────────────────────────────────────────────
function setLanguage(lang) {
  if (!UI_STRINGS[lang]) return;
  currentLang = lang;
  localStorage.setItem("epirus_lang", lang);

  const strings = UI_STRINGS[lang];

  // Update all data-i18n text nodes
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (strings[key] !== undefined) el.textContent = strings[key];
  });

  // Update all data-i18n-placeholder attributes
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
    const key = el.getAttribute("data-i18n-placeholder");
    if (strings[key]) el.placeholder = strings[key];
  });

  // Re-render NDA scrollable text
  renderNdaText(lang);

  // Update invalid ref message if shown
  const invalidMsg = document.getElementById("invalidMsg");
  if (invalidMsg) invalidMsg.textContent = strings.invalid_ref;

  // Update lang switcher button states + aria-pressed
  document.querySelectorAll(".lang-btn").forEach(btn => {
    const isActive = btn.dataset.lang === lang;
    btn.classList.toggle("active", isActive);
    btn.setAttribute("aria-pressed", isActive ? "true" : "false");
  });

  document.documentElement.lang = lang === "el" ? "el" : "en";
}

function renderNdaText(lang) {
  const box = document.getElementById("ndaTextBox");
  if (!box) return;
  const rawText = UI_STRINGS[lang].nda_body || "";
  // Split on double newlines to create paragraphs
  const paras = rawText.split(/\n\n+/).map(p => p.trim()).filter(Boolean);
  box.innerHTML = paras.map(p => `<p>${p.replace(/\n/g, "<br>")}</p>`).join("");
}

// ── Ref validation ───────────────────────────────────────────────────
function getRefParam() {
  return new URLSearchParams(window.location.search).get("ref") || "";
}

function showInvalidState() {
  document.getElementById("invalidState").style.display = "block";
  document.getElementById("ndaSection").style.display = "none";
}

// ── Form validation ──────────────────────────────────────────────────
function validateForm() {
  const name    = document.getElementById("fieldName").value.trim();
  const email   = document.getElementById("fieldEmail").value.trim();
  const ndaOk   = document.getElementById("checkNda").checked;
  const gdprOk  = document.getElementById("checkGdpr").checked;
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  const allOk   = name.length > 0 && emailOk && ndaOk && gdprOk;
  document.getElementById("submitBtn").disabled = !allOk;
}

// ── Property cards ───────────────────────────────────────────────────
function renderPropertyCards(properties) {
  const container = document.getElementById("propertyCards");
  const linkLabel = UI_STRINGS[currentLang].view_listing || "View listing →";
  container.innerHTML = properties.map(prop => `
    <article class="property-card">
      <div class="property-card-name">${escapeHtml(prop.name)}</div>
      <div class="property-card-desc">${escapeHtml(prop.description)}</div>
      <a class="property-card-link" href="${escapeAttr(prop.url)}" target="_blank" rel="noopener">
        ${linkLabel}
      </a>
    </article>
  `).join("");
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function escapeAttr(str) {
  // Only allow relative paths and trusted same-origin URLs for property links
  const s = String(str);
  if (/^https?:\/\//i.test(s)) return "#"; // block absolute URLs in config
  return s.replace(/"/g, "%22");
}

// ── Success reveal ───────────────────────────────────────────────────
function revealLinks(name, properties) {
  const strings  = UI_STRINGS[currentLang];
  const ndaSection     = document.getElementById("ndaSection");
  const successSection = document.getElementById("successSection");
  const greeting       = document.getElementById("successGreeting");

  greeting.textContent = strings.success_greeting.replace("{name}", name);
  renderPropertyCards(properties);

  // Fade out form
  ndaSection.style.transition = "opacity 0.3s ease";
  ndaSection.style.opacity    = "0";

  setTimeout(() => {
    ndaSection.style.display = "none";
    successSection.classList.add("visible");
    // Trigger reflow before fading in
    void successSection.offsetHeight;
    successSection.classList.add("faded-in");
    console.log("[NDA] Links revealed for:", name);
  }, 300);
}

// ── Formspree submit ─────────────────────────────────────────────────
async function handleSubmit(e) {
  e.preventDefault();

  const name    = document.getElementById("fieldName").value.trim();
  const email   = document.getElementById("fieldEmail").value.trim();
  const refData = NDA_REFS[currentRef];
  const submitBtn = document.getElementById("submitBtn");

  submitBtn.disabled    = true;
  submitBtn.textContent = "…";

  const payload = {
    name,
    email,
    ref:        currentRef,
    ref_label:  refData.label,
    nda_agreed: "Yes",
    gdpr_consent: "Yes",
    timestamp:  new Date().toISOString(),
    page_url:   window.location.href
  };

  console.log("[NDA] Formspree call start", { ref: currentRef, email });

  try {
    const response = await fetch(FORMSPREE_ENDPOINT, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept":       "application/json"
      },
      body: JSON.stringify(payload)
    });

    if (response.ok) {
      console.log("[NDA] Formspree call success");
    } else {
      console.error("[NDA] Formspree call failed, status:", response.status, "— proceeding anyway");
    }
  } catch (err) {
    console.error("[NDA] Formspree call error:", err, "— proceeding anyway");
  }

  // Always reveal links — do not block the client on notification failure
  revealLinks(name, refData.properties);
}

// ── Init ─────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {

  // Determine initial language: saved preference > browser language > EN
  const savedLang  = localStorage.getItem("epirus_lang");
  const browserLang = (navigator.language || "").toLowerCase();
  const initLang   = savedLang || (browserLang.startsWith("el") ? "el" : "en");

  // Read and validate ref param
  currentRef = getRefParam();
  console.log("[NDA] ref param read:", currentRef || "(none)");

  const refData = currentRef ? NDA_REFS[currentRef] : null;

  if (!refData) {
    setLanguage(initLang);
    showInvalidState();
    return;
  }

  // Valid ref — show the NDA form
  document.getElementById("ndaSection").style.display = "block";
  setLanguage(initLang);

  // Wire up live form validation
  ["fieldName", "fieldEmail", "checkNda", "checkGdpr"].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener("input",  validateForm);
    el.addEventListener("change", validateForm);
  });

  // Submit handler
  document.getElementById("ndaForm").addEventListener("submit", handleSubmit);

  // Language switcher
  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
  });
});
</script>
